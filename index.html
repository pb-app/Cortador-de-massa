<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Central - Guilhotinas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #f0f2f5; --card-bg: #ffffff; --primary: #0056b3; --text-main: #333333; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: var(--text-main); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        
        .acoes-topo { display: flex; gap: 15px; align-items: center; }
        .btn-novo { background-color: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .badge-turno { background-color: var(--text-main); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        .grid-maquinas { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card-maquina { background-color: var(--card-bg); border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #ccc; }
        .card-maquina.online { border-left-color: var(--success); }
        .card-maquina.offline { border-left-color: var(--danger); }
        .maquina-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .status-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; color: white; }
        .online .status-badge { background-color: var(--success); }
        .offline .status-badge { background-color: var(--danger); }

        .grid-controle { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        
        .painel-controle, .painel-receitas { background-color: var(--card-bg); border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .form-receita { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; margin-top: 15px; }
        .input-group { display: flex; flex-direction: column; flex: 1; min-width: 150px; }
        .input-group label { font-size: 0.9rem; margin-bottom: 5px; font-weight: bold; }
        .input-group input, .input-group select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; }
        
        button.btn-enviar { background-color: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 1rem; cursor: pointer; font-weight: bold; height: 42px; }
        
        .lista-receitas { list-style: none; padding: 0; margin: 0; margin-top: 15px; max-height: 200px; overflow-y: auto;}
        .lista-receitas li { background: #f8f9fa; margin-bottom: 5px; padding: 10px; border-radius: 4px; display: flex; justify-content: space-between; border-left: 3px solid var(--primary);}
        
        .nota { font-size: 0.85rem; color: #666; font-style: italic; }

        @media (max-width: 768px) {
            .grid-controle { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-industry"></i> Gestão de Produção</h1>
        <div class="acoes-topo">
            <button class="btn-novo" onclick="cadastrarNovaMaquina()"><i class="fas fa-plus"></i> Nova Máquina</button>
            <div class="badge-turno"><i class="fas fa-clock"></i> Supervisor Turno 3</div>
        </div>
    </div>

    <!-- Grid de Máquinas (Visualização) -->
    <div class="grid-maquinas" id="container-maquinas">
        <div class="card-maquina online" id="maquina-1">
            <div class="maquina-header">
                <h2>Cortador 01</h2>
                <span class="status-badge">RODANDO</span>
            </div>
            <p>Receita: <b>Tarugo 190 (44cm)</b></p>
            <p>Cortes: <b>1.450</b></p>
        </div>
        
        <div class="card-maquina offline" id="maquina-2">
            <div class="maquina-header">
                <h2>Cortador 02</h2>
                <span class="status-badge">PARADO</span>
            </div>
            <p>Receita: <b>Mesa 10cm</b></p>
            <p>Cortes: <b>0</b></p>
        </div>
    </div>

    <div class="grid-controle">
        <!-- Enviar Nova Receita -->
        <div class="painel-controle">
            <h2><i class="fas fa-paper-plane"></i> Enviar Receita Remota</h2>
            <div class="form-receita">
                <div class="input-group">
                    <label>Selecione o Alvo</label>
                    <!-- O evento onchange avisa o sistema que você trocou de máquina -->
                    <select id="alvo-maquina" onchange="atualizarListaReceitas()">
                        <option value="" disabled selected>Escolha...</option>
                        <option value="todos" style="font-weight: bold; color: var(--primary);">=> Todos os Cortadores</option>
                        <option value="cortador_01">Cortador 01</option>
                        <option value="cortador_02">Cortador 02</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Nome (Ex: Tarugo Especial)</label>
                    <input type="text" id="nova-receita-nome">
                </div>
                <div class="input-group">
                    <label>Tamanho (cm)</label>
                    <input type="number" id="nova-receita-tam" step="0.1">
                </div>
                <button class="btn-enviar" onclick="enviarReceita()">Enviar</button>
            </div>
        </div>

        <!-- Visualizar Receitas da Máquina Selecionada -->
        <div class="painel-receitas">
            <h2><i class="fas fa-list"></i> Receitas Salvas</h2>
            <p class="nota" id="aviso-receitas">Selecione uma máquina para ver suas receitas.</p>
            <ul class="lista-receitas" id="lista-receitas-salvas">
                <!-- As receitas aparecerão aqui via JavaScript -->
            </ul>
        </div>
    </div>

    <script>
        // Simulação de banco de dados (Isso virá do Firebase depois)
        const bancoDeDadosSimulado = {
            "cortador_01": [
                { nome: "Tarugo 190", tamanho: 44.0 },
                { nome: "Mesa 10", tamanho: 10.0 }
            ],
            "cortador_02": [
                { nome: "Tarugo 140", tamanho: 39.0 }
            ]
        };

        // 1. Cadastrar Máquina
        function cadastrarNovaMaquina() {
            let nomeMaquina = prompt("Digite a ID da nova máquina (ex: cortador_03):");
            if(nomeMaquina) {
                alert(`Máquina '${nomeMaquina}' preparada no sistema! Quando o ESP32 dela conectar na internet, ela aparecerá no painel.`);
                // No futuro, isso criará um nó no Firebase.
            }
        }

        // 2. Mostrar receitas ao selecionar a máquina
        function atualizarListaReceitas() {
            const maquina = document.getElementById('alvo-maquina').value;
            const lista = document.getElementById('lista-receitas-salvas');
            const aviso = document.getElementById('aviso-receitas');
            
            lista.innerHTML = ""; // Limpa a lista

            if (maquina === "todos") {
                aviso.innerText = "Modo 'Todos' selecionado. A receita será enviada para todas as guilhotinas.";
                return; // Sai da função, não mostra receitas.
            } 
            
            if (maquina) {
                aviso.innerText = `Mostrando receitas atuais de: ${maquina}`;
                // No futuro, isso fará um 'database.ref' no Firebase. Aqui é a simulação:
                let receitasDaMaquina = bancoDeDadosSimulado[maquina] || [];
                
                if(receitasDaMaquina.length === 0) {
                    lista.innerHTML = "<li>Sem receitas cadastradas.</li>";
                } else {
                    receitasDaMaquina.forEach(rec => {
                        lista.innerHTML += `<li><span>${rec.nome}</span> <b>${rec.tamanho} cm</b></li>`;
                    });
                }
            }
        }

        // 3. Enviar Receita (Indivídual ou Todos)
        function enviarReceita() {
            const maquina = document.getElementById('alvo-maquina').value;
            const nome = document.getElementById('nova-receita-nome').value;
            const tam = document.getElementById('nova-receita-tam').value;

            if(!maquina) { alert("Selecione um alvo!"); return; }
            if(!nome || !tam) { alert("Preencha o nome e tamanho!"); return; }

            if (maquina === "todos") {
                // Loop que enviará para todas as máquinas no Firebase
                alert(`COMANDO EM MASSA: Receita '${nome}' (${tam}cm) sendo disparada para TODOS os cortadores!`);
            } else {
                // Envia só para a específica
                alert(`Sucesso: Receita '${nome}' enviada para ${maquina}.`);
            }

            document.getElementById('nova-receita-nome').value = '';
            document.getElementById('nova-receita-tam').value = '';
        }
    </script>
</body>
</html>
