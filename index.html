<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Central - Guilhotinas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #f0f2f5; --card-bg: #ffffff; --primary: #0056b3; --text-main: #333333; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --muted: #6c757d;}
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: var(--text-main); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        
        .acoes-topo { display: flex; gap: 15px; align-items: center; }
        .btn-novo { background-color: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .badge-turno { background-color: var(--primary); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        .grid-maquinas { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card-maquina { background-color: var(--card-bg); border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #ccc; transition: 0.3s; }
        
        .card-maquina.online { border-left-color: var(--success); }
        .card-maquina.offline { border-left-color: var(--danger); opacity: 0.9;}
        
        .maquina-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .maquina-header h2 { margin: 0 0 5px 0; font-size: 1.3rem;}
        
        .status-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; color: white; display: inline-block;}
        .online .status-badge { background-color: var(--success); }
        .offline .status-badge { background-color: var(--danger); }

        .btn-excluir { background: transparent; color: #dc3545; border: none; font-size: 1.2rem; cursor: pointer; transition: 0.2s; padding: 0; }
        .btn-excluir:hover { color: #a71d2a; transform: scale(1.1); }
        .btn-excluir-rec { background: var(--danger); color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
        
        /* Estilos de Eficiência */
        .caixa-eficiencia { margin-top: 15px; padding: 10px; border-radius: 5px; background: #f8f9fa; border: 1px solid #ddd;}
        .caixa-eficiencia p { margin: 5px 0; font-size: 0.9rem;}
        .texto-adiantado { color: var(--success); font-weight: bold; font-size: 1.1rem !important;}
        .texto-atrasado { color: var(--danger); font-weight: bold; font-size: 1.1rem !important;}
        
        .rodape-tempo { font-size: 0.8rem; color: var(--muted); margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px;}

        .grid-controle { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .painel-controle, .painel-receitas { background-color: var(--card-bg); border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .form-receita { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; margin-top: 15px; }
        .input-group { display: flex; flex-direction: column; flex: 1; min-width: 150px; }
        .input-group label { font-size: 0.9rem; margin-bottom: 5px; font-weight: bold; }
        .input-group input, .input-group select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; }
        
        button.btn-enviar { background-color: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 1rem; cursor: pointer; font-weight: bold; height: 42px; }
        
        .lista-receitas { list-style: none; padding: 0; margin: 0; margin-top: 15px; max-height: 200px; overflow-y: auto;}
        .lista-receitas li { background: #f8f9fa; margin-bottom: 5px; padding: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--primary);}
        .nota { font-size: 0.85rem; color: var(--muted); font-style: italic; }

        @media (max-width: 768px) { .grid-controle { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-chart-line"></i> Gestão de Produção</h1>
        <div class="acoes-topo">
            <button class="btn-novo" onclick="cadastrarNovaMaquina()"><i class="fas fa-plus"></i> Nova Máquina</button>
            <!-- O Turno agora muda sozinho dependendo do horário -->
            <div class="badge-turno" id="indicador-turno"><i class="fas fa-clock"></i> Calculando Turno...</div>
        </div>
    </div>

    <div class="grid-maquinas" id="container-maquinas"></div>

    <div class="grid-controle">
        <div class="painel-controle">
            <h2><i class="fas fa-paper-plane"></i> Enviar Comando Remoto</h2>
            <div class="form-receita">
                <div class="input-group">
                    <label>Selecione o Alvo</label>
                    <select id="alvo-maquina" onchange="atualizarListaReceitas()">
                        <option value="" disabled selected>Escolha...</option>
                        <option value="todos" style="font-weight: bold; color: var(--primary);">=> Todos os Cortadores</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Nome da Receita</label>
                    <input type="text" id="nova-receita-nome" placeholder="Ex: Tarugo">
                </div>
                <div class="input-group" style="min-width: 100px;">
                    <label>Tam. (cm)</label>
                    <input type="number" id="nova-receita-tam" step="0.1">
                </div>
                <!-- NOVO CAMPO: META DE CORTES -->
                <div class="input-group" style="min-width: 100px;">
                    <label>Meta Turno</label>
                    <input type="number" id="nova-meta-turno" placeholder="Ex: 5000">
                </div>
                <button class="btn-enviar" onclick="enviarComandos()">Enviar</button>
            </div>
            <p class="nota" style="margin-top:10px;">* Preencha a receita, a meta, ou ambos. Enviar apenas a meta não apaga a receita atual.</p>
        </div>

        <div class="painel-receitas">
            <h2><i class="fas fa-list"></i> Receitas Salvas</h2>
            <p class="nota" id="aviso-receitas">Selecione uma máquina para ver suas receitas.</p>
            <ul class="lista-receitas" id="lista-receitas-salvas"></ul>
        </div>
    </div>

    <!-- Scripts do Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQ7NtswbecbZBZ-epD5-cmUL-zzI42ph0",
            authDomain: "cortador-de-massas.firebaseapp.com",
            databaseURL: "https://cortador-de-massas-default-rtdb.firebaseio.com",
            projectId: "cortador-de-massas",
            storageBucket: "cortador-de-massas.firebasestorage.app",
            messagingSenderId: "824669320111",
            appId: "1:824669320111:web:37a544472a56097f88f55a",
            measurementId: "G-ZSMLVQFZTQ"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let dadosGlobaisMaquinas = {}; 
        const TEMPO_LIMITE_PARADA = 60000; 

        // ==========================================
        // LÓGICA DE TURNOS E EFICIÊNCIA
        // ==========================================
        function obterDadosDoTurno() {
            const agora = new Date();
            const hora = agora.getHours();
            const minuto = agora.getMinutes();
            const totalMinutosDia = (hora * 60) + minuto;

            let nomeTurno = "";
            let minutosDecorridos = 0;

            // Turno 1: 06:00 as 14:00 (Minuto 360 ao 839)
            if (hora >= 6 && hora < 14) {
                nomeTurno = "Turno 1 (06h as 14h)";
                minutosDecorridos = totalMinutosDia - 360;
            } 
            // Turno 2: 14:00 as 22:00 (Minuto 840 ao 1319)
            else if (hora >= 14 && hora < 22) {
                nomeTurno = "Turno 2 (14h as 22h)";
                minutosDecorridos = totalMinutosDia - 840;
            } 
            // Turno 3: 22:00 as 06:00 (Atravessa a meia noite)
            else {
                nomeTurno = "Turno 3 (22h as 06h)";
                if (hora >= 22) {
                    minutosDecorridos = totalMinutosDia - 1320; 
                } else {
                    minutosDecorridos = 120 + totalMinutosDia; // 2h antes da meia noite + hora atual
                }
            }

            return { nome: nomeTurno, minutos: minutosDecorridos };
        }

        // ==========================================
        // DESENHAR TELA E DADOS DO FIREBASE
        // ==========================================
        database.ref('maquinas').on('value', (snapshot) => {
            const container = document.getElementById('container-maquinas');
            const selectAlvo = document.getElementById('alvo-maquina');
            const selecaoAtual = selectAlvo.value; 

            container.innerHTML = ''; 
            dadosGlobaisMaquinas = {}; 
            
            selectAlvo.innerHTML = `
                <option value="" disabled ${selecaoAtual === "" ? "selected" : ""}>Escolha...</option>
                <option value="todos" style="font-weight: bold; color: var(--primary);" ${selecaoAtual === "todos" ? "selected" : ""}>=> Todos os Cortadores</option>
            `;

            if (snapshot.exists()) {
                dadosGlobaisMaquinas = snapshot.val();
                
                for (const idMaquina in dadosGlobaisMaquinas) {
                    const dados = dadosGlobaisMaquinas[idMaquina];
                    const receitaNome = dados.receitaAtual || 'Nenhuma';
                    const cortesCount = dados.cortes || 0;
                    const metaTurno = dados.metaTurno || 0;

                    // Cria os Cards na tela
                    const cardHTML = `
                        <div class="card-maquina offline" id="card-${idMaquina}">
                            <div class="maquina-header">
                                <div>
                                    <h2>${idMaquina.toUpperCase().replace('_', ' ')}</h2>
                                    <span class="status-badge" id="badge-${idMaquina}">ANALISANDO...</span>
                                </div>
                                <button class="btn-excluir" onclick="excluirMaquina('${idMaquina}')"><i class="fas fa-trash"></i></button>
                            </div>
                            
                            <p style="margin-top:0;">Receita: <b>${receitaNome}</b></p>
                            
                            <!-- CAIXA DE EFICIÊNCIA -->
                            <div class="caixa-eficiencia">
                                <p>Cortes Realizados: <b>${cortesCount}</b></p>
                                <p>Meta do Turno: <b>${metaTurno > 0 ? metaTurno : 'Não definida'}</b></p>
                                <div id="eficiencia-${idMaquina}" style="margin-top: 8px;"></div>
                            </div>

                            <div class="rodape-tempo" id="tempo-${idMaquina}">Último corte: --</div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHTML);

                    const novaOpcao = document.createElement('option');
                    novaOpcao.value = idMaquina;
                    novaOpcao.text = idMaquina.toUpperCase().replace('_', ' ');
                    if(idMaquina === selecaoAtual) novaOpcao.selected = true;
                    selectAlvo.appendChild(novaOpcao);
                }
                atualizarListaReceitas(); 
            } else {
                container.innerHTML = '<p style="color: #666; width: 100%;">Nenhuma máquina conectada.</p>';
            }
        });

        // ==========================================
        // MOTOR DE TEMPO REAL (OEE E STATUS)
        // ==========================================
        setInterval(() => {
            const agora = Date.now();
            const dadosTurno = obterDadosDoTurno();
            
            // Atualiza a plaquinha no topo
            document.getElementById('indicador-turno').innerHTML = `<i class="fas fa-clock"></i> ${dadosTurno.nome}`;

            for (const idMaquina in dadosGlobaisMaquinas) {
                const dados = dadosGlobaisMaquinas[idMaquina];
                const card = document.getElementById(`card-${idMaquina}`);
                const badge = document.getElementById(`badge-${idMaquina}`);
                const textoTempo = document.getElementById(`tempo-${idMaquina}`);
                const divEficiencia = document.getElementById(`eficiencia-${idMaquina}`);

                if (card && badge) {
                    // 1. ANÁLISE DE MÁQUINA PARADA
                    const tempoUltimoCorte = dados.ultimoCorteTempo || 0; 
                    const diferencaTempo = agora - tempoUltimoCorte;

                    if (tempoUltimoCorte === 0) {
                        badge.innerText = "AGUARDANDO CORTE";
                        card.classList.remove('online'); card.classList.add('offline');
                        textoTempo.innerText = "Nenhum corte registrado.";
                    } else if (diferencaTempo <= TEMPO_LIMITE_PARADA) {
                        badge.innerText = "RODANDO";
                        card.classList.remove('offline'); card.classList.add('online');
                        textoTempo.innerText = `Último corte há ${Math.floor(diferencaTempo / 1000)} seg`;
                    } else {
                        badge.innerText = "PARADO";
                        card.classList.remove('online'); card.classList.add('offline');
                        textoTempo.innerText = `Parado há ${Math.floor((diferencaTempo / 1000) / 60)} min.`;
                    }

                    // 2. CÁLCULO DE EFICIÊNCIA (RITMO)
                    const meta = dados.metaTurno || 0;
                    const cortesReais = dados.cortes || 0;

                    if (meta > 0 && dadosTurno.minutos > 0) {
                        // Calcula o ritmo ideal: (Meta / 480 min) * Minutos já passados
                        const ritmoEsperadoMinuto = meta / 480; 
                        const esperadoAteAgora = Math.floor(ritmoEsperadoMinuto * dadosTurno.minutos);
                        const diferenca = cortesReais - esperadoAteAgora;

                        if (diferenca >= 0) {
                            divEficiencia.innerHTML = `<p class="texto-adiantado"><i class="fas fa-arrow-up"></i> +${diferenca} peças na frente</p>`;
                        } else {
                            divEficiencia.innerHTML = `<p class="texto-atrasado"><i class="fas fa-arrow-down"></i> ${diferenca} peças atrasado</p>`;
                        }
                    } else {
                        divEficiencia.innerHTML = `<p style="color:var(--muted);"><i class="fas fa-minus"></i> Aguardando ritmo...</p>`;
                    }
                }
            }
        }, 2000);

        // ==========================================
        // OUTRAS FUNÇÕES (EXCLUIR, ATUALIZAR, ETC)
        // ==========================================
        function excluirMaquina(id) { if (confirm(`Excluir '${id}'?`)) database.ref('maquinas/' + id).remove(); }
        function excluirReceitaSalva(idMq, idRec) { if (confirm("Apagar receita?")) database.ref('maquinas/' + idMq + '/receitasSalvas/' + idRec).remove(); }
        
        function atualizarListaReceitas() {
            const maquina = document.getElementById('alvo-maquina').value;
            const lista = document.getElementById('lista-receitas-salvas');
            lista.innerHTML = ""; 
            if (maquina && maquina !== "todos" && dadosGlobaisMaquinas[maquina]?.receitasSalvas) {
                const receitas = dadosGlobaisMaquinas[maquina].receitasSalvas;
                for (const ch in receitas) lista.innerHTML += `<li><span>${receitas[ch].nome} <b>(${receitas[ch].tamanhoCm} cm)</b></span> <button class="btn-excluir-rec" onclick="excluirReceitaSalva('${maquina}', '${ch}')"><i class="fas fa-times"></i></button></li>`;
            } else { lista.innerHTML = "<li>Sem receitas cadastradas.</li>"; }
        }

        // Modificado para enviar Receita E/OU Meta
        function enviarComandos() {
            const maquina = document.getElementById('alvo-maquina').value;
            const nome = document.getElementById('nova-receita-nome').value;
            const tam = document.getElementById('nova-receita-tam').value;
            const meta = document.getElementById('nova-meta-turno').value;

            if(!maquina) { alert("Selecione um alvo!"); return; }
            if(!nome && !tam && !meta) { alert("Preencha a receita ou a meta para enviar!"); return; }

            const alvos = maquina === "todos" 
                ? Array.from(document.getElementById('alvo-maquina').options).map(o => o.value).filter(v => v && v !== "todos") 
                : [maquina];

            alvos.forEach(alvo => {
                // Se preencheu a Receita, manda pra máquina
                if(nome && tam) {
                    database.ref('maquinas/' + alvo + '/comando_receita').set({ nome: nome, tamanhoCm: parseFloat(tam), timestamp: Date.now() });
                }
                // Se preencheu a Meta, salva no banco para calcular a eficiência
                if(meta) {
                    database.ref('maquinas/' + alvo + '/metaTurno').set(parseInt(meta));
                }
            });

            alert("Comandos enviados com sucesso!");
            document.getElementById('nova-receita-nome').value = ''; document.getElementById('nova-receita-tam').value = ''; document.getElementById('nova-meta-turno').value = '';
        }

        function cadastrarNovaMaquina() {
            let n = prompt("ID da máquina (ex: cortador_01):");
            if(n) database.ref('maquinas/' + n.toLowerCase().replace(' ', '_')).set({ receitaAtual: "Aguardando...", cortes: 0, ultimoCorteTempo: 0, metaTurno: 0 });
        }
    </script>
</body>
</html>
